<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOG POST</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <h1>Simple Blog</h1>
    <div class="blogpost-container">

        <h2>Create A New Post</h2>

        <form id="blogpost-form">
            
            <input type="text" name="" id="blogpost-input" placeholder="Post Titile">
           <input type="text" id="blogpost-image" placeholder="Image URL">
            <textarea name="" id="blogpost-text" placeholder="Write Your Post"></textarea>
          
            <button type="submit" id="blogPost-btn">Add Post</button>

            

        </form>
  

     <ul id="blog-list">
     
       


     </ul>


    </div>
   
    <script src="script.js"></script>
</body>
